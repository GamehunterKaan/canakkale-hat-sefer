name: Update Transit Data

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 Turkey time (UTC+3)
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch schedule data (PDFs → JSON)
        run: node scripts/fetch-schedule.mjs

      - name: Fetch stops data (kentkart API → JSON)
        run: node scripts/fetch-stops.mjs

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json data/stops.json
          git diff --staged --quiet || git commit -m "chore: update transit data $(date -u '+%Y-%m-%d')" && git push

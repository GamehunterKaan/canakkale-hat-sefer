<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d1520">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Çanakkale Hat & Sefer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Çanakkale Hat & Sefer" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117; color: #e2e8f0;
      display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden;
    }
    #appHeader {
      background: #0d1520; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.6); z-index: 300;
    }
    #appHeader h1 { font-size: .95rem; font-weight: 700; }
    /* ── Header bookmarks dropdown ── */
    #bm-toggle-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid #252d40; border-radius: 6px;
      color: #9ca3af; font-size: .72rem; font-weight: 700;
      padding: 4px 9px; cursor: pointer; transition: color .12s, border-color .12s;
      white-space: nowrap;
    }
    #bm-toggle-btn:hover, #bm-toggle-btn.open { color: #f59e0b; border-color: #f59e0b; }
    #bm-dropdown {
      display: none; position: fixed; top: 44px; right: 12px;
      background: #1a1d2e; border: 1px solid #252d40; border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.6); z-index: 400;
      min-width: 260px; max-width: 320px; max-height: 60dvh; overflow-y: auto;
      z-index: 1000;
      padding: 6px 0;
    }
    #bm-dropdown.open { display: block; }
    .bm-dd-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px 4px; font-size: .65rem; font-weight: 700;
      text-transform: uppercase; color: #4a5568; letter-spacing: .04em;
    }
    .bm-dd-empty { padding: 10px 12px; color: #4a5568; font-size: .75rem; }
    #screenWrap { flex: 1; overflow: hidden; display: flex; }
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }
    #bottomNav {
      display: flex; flex-shrink: 0; background: #0d1520;
      border-top: 1px solid #252d40; padding-bottom: env(safe-area-inset-bottom);
    }
    .nb {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; padding: 8px 4px;
      background: none; border: none; color: #4a5568;
      font-size: .63rem; font-weight: 700; cursor: pointer; transition: color .15s;
    }
    .nb span { font-size: 1.25rem; line-height: 1; }
    .nb.active { color: #7eb3f7; }

    /* ── Schedule ── */
    #scr-schedule { overflow: hidden; }
    .s-tabs {
      display: flex; flex-shrink: 0; background: #141621;
      border-bottom: 2px solid #252d40; padding: 0 10px;
    }
    .s-tab-btn {
      padding: 10px 16px; border: none; background: none;
      color: #6b7a99; font-weight: 700; font-size: .85rem; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .s-tab-btn.active { color: #7eb3f7; border-bottom-color: #4a90d9; }
    .dir-section { margin-top: 8px; }
    .dir-section + .dir-section { margin-top: 6px; padding-top: 8px; border-top: 1px solid #1e2235; }
    .dir-lbl { font-size: .65rem; font-weight: 700; color: #4a90d9; margin-bottom: 4px; letter-spacing: .03em; }
    .sched-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: .72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    #schedLoading {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; padding: 24px;
    }
    #schedProgress { width: 100%; max-width: 300px; height: 4px; background: #1e2235; border-radius: 2px; overflow: hidden; }
    #schedProgressBar { height: 100%; background: #4a90d9; border-radius: 2px; transition: width .3s; width: 0%; }
    #schedMsg { font-size: .85rem; color: #6b7a99; text-align: center; }
    #schedError { display: none; color: #ef4444; font-size: .82rem; text-align: center; line-height: 1.5; }
    .sched-content { display: none; flex: 1; overflow-y: auto; padding: 10px 12px 12px; }
    .sched-content.visible { display: block; }
    .route-card {
      background: #1a1d2e; border-radius: 8px; margin-bottom: 10px;
      border: 1.5px solid #252d40; overflow: hidden;
    }
    .route-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; cursor: pointer; user-select: none;
    }
    .rc-name { font-weight: 700; font-size: .9rem; }
    .rc-meta { font-size: .72rem; color: #4a5568; }
    .rc-chevron { color: #4a5568; font-size: .8rem; transition: transform .2s; }
    .route-card.open .rc-chevron { transform: rotate(180deg); }
    .route-card-body { display: none; padding: 0 12px 12px; border-top: 1px solid #252d40; }
    .route-card.open .route-card-body { display: block; }
    .times-grid { display: flex; flex-wrap: wrap; gap: 5px; padding-top: 10px; }
    .time-chip {
      padding: 5px 10px; border-radius: 6px; font-size: .78rem; font-weight: 700;
      font-variant-numeric: tabular-nums; background: #1e2235; color: #c0d0ea; border: 1px solid #252d40;
    }
    .time-chip.past { color: #374151; background: #141621; border-color: #1e2235; }
    .time-chip.next { color: #fff; background: #1a3660; border-color: #4a90d9; box-shadow: 0 0 8px rgba(74,144,217,.3); }

    /* ── Planner ── */
    #scr-planner { flex-direction: column; }
    .p-top {
      flex-shrink: 0; background: #141621; border-bottom: 1px solid #252d40;
      display: flex; flex-direction: column; overflow: hidden; max-height: 48dvh;
    }
    #loadBar { display: none; }
    #loadStatus { display: none; }
    .btn-row { display: flex; gap: 5px; padding: 9px 9px 0; flex-shrink: 0; }
    .btn {
      flex: 1; padding: 8px 3px; border: 1.5px solid #3b6ccc; border-radius: 7px;
      background: #141621; color: #7eb3f7; font-weight: 700; font-size: .74rem;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn.active { background: #1a3660; color: #a8d4ff; border-color: #4a90d9; }
    .btn.green  { border-color: #22743c; color: #4ade80; }
    .btn.green.active { background: #14422a; color: #86efac; border-color: #22c55e; }
    .btn:hover:not(.active) { background: #1e2235; }
    .btn:disabled { opacity: .35; cursor: default; }
    .plan-time-row { display: flex; gap: 4px; padding: 6px 9px 0; flex-shrink: 0; }
    .plan-time-btn {
      flex: 1; padding: 5px 2px; border: 1px solid #252d40; border-radius: 5px;
      background: #141621; color: #4a5568; font-size: .68rem; font-weight: 700;
      cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .plan-time-btn.active { background: #1a2744; color: #a8d4ff; border-color: #4a90d9; }
    .plan-time-btn:hover:not(.active) { color: #7eb3f7; border-color: #374151; }
    #custom-time-input {
      width: 100%; padding: 6px 10px; border-radius: 6px;
      border: 1.5px solid #4a90d9; background: #0f1d33;
      color: #a8d4ff; font-size: .82rem; outline: none;
      color-scheme: dark;
    }
    #hint { margin: 7px 9px 0; padding: 7px 9px; background: #1a2744; border-radius: 6px; font-size: .78rem; color: #7eb3f7; flex-shrink: 0; }
    #hint.warn { background: #2d1f05; color: #fbbf24; }
    .stop-card { margin: 5px 9px 0; padding: 7px 10px; border-radius: 7px; border-left: 4px solid #3b6ccc; background: #1a1d2e; font-size: .78rem; flex-shrink: 0; }
    .stop-card.green { border-left-color: #22743c; }
    .stop-card .label { font-weight: 700; font-size: .65rem; text-transform: uppercase; opacity: .5; margin-bottom: 2px; }
    .stop-card .name  { font-weight: 700; font-size: .88rem; }
    .stop-card .dist  { color: #6b7a99; margin-top: 1px; font-size: .72rem; }
    .p-results { flex: 1; overflow-y: auto; padding: 7px 9px 18px; }
    /* ── Bookmarks ── */
    #bm-bar { flex-shrink: 0; padding: 7px 9px 0; display: none; }
    .bm-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      color: #4a5568; letter-spacing: .04em; margin-bottom: 5px;
    }
    .bm-add-btn {
      background: none; border: none; color: #7eb3f7; font-size: .7rem;
      font-weight: 700; cursor: pointer; padding: 0;
    }
    .bm-list { display: flex; flex-direction: column; gap: 4px; }
    .bm-card {
      display: flex; align-items: center; gap: 6px;
      background: #1a1d2e; border: 1px solid #252d40; border-radius: 7px;
      padding: 6px 9px; font-size: .78rem;
    }
    .bm-icon { font-size: .95rem; flex-shrink: 0; }
    .bm-name { flex: 1; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bm-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .bm-btn {
      padding: 3px 7px; border-radius: 4px; border: 1px solid #252d40;
      background: #141621; color: #6b7a99; font-size: .66rem; font-weight: 700;
      cursor: pointer; transition: color .12s, border-color .12s;
    }
    .bm-btn.origin:hover { color: #7eb3f7; border-color: #3b6ccc; }
    .bm-btn.dest:hover   { color: #4ade80; border-color: #22743c; }
    .bm-btn.del:hover    { color: #ef4444; border-color: #7f1d1d; }
    .bm-save-btn {
      background: none; border: 1px solid #374151; border-radius: 4px;
      color: #9ca3af; font-size: .65rem; font-weight: 700;
      cursor: pointer; padding: 2px 6px; transition: color .12s, border-color .12s; line-height: 1;
    }
    .bm-save-btn:hover { color: #f59e0b; border-color: #f59e0b; }
    .result-header { font-size: .68rem; font-weight: 700; text-transform: uppercase; color: #4a5568; margin: 8px 0 5px; }
    .p-route-card { padding: 9px 11px; border-radius: 7px; background: #1a1d2e; border: 1.5px solid #252d40; margin-bottom: 7px; cursor: pointer; transition: border-color .15s; }
    .p-route-card:hover  { border-color: #4a90d9; }
    .p-route-card.active { border-color: #4a90d9; background: #1a2744; }
    .p-route-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .p-route-badge { padding: 2px 7px; border-radius: 4px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
    .p-route-name  { font-size: .78rem; font-weight: 600; flex: 1; }
    .p-route-meta  { font-size: .72rem; color: #6b7a99; }
    .bus-chip { display: inline-block; background: #1a2744; color: #7eb3f7; border-radius: 4px; padding: 2px 5px; font-size: .68rem; font-weight: 600; margin: 2px 2px 0 0; }
    .nearby-stop { margin: 0 0 5px; border-radius: 7px; border: 1.5px solid #252d40; overflow: hidden; cursor: pointer; transition: border-color .15s; }
    .nearby-stop:hover, .nearby-stop.open { border-color: #4a90d9; }
    .ns-header { padding: 8px 10px; display: flex; align-items: center; gap: 7px; background: #1a1d2e; }
    .ns-dist  { font-size: .68rem; font-weight: 700; color: #7eb3f7; min-width: 38px; }
    .ns-name  { font-weight: 700; font-size: .83rem; flex: 1; }
    .ns-tags  { font-size: .64rem; color: #4a5568; margin-top: 2px; }
    .ns-body  { display: none; padding: 6px 10px 8px; border-top: 1px solid #252d40; background: #141621; }
    .nearby-stop.open .ns-body { display: block; }
    .bus-row { display: flex; align-items: center; gap: 7px; padding: 4px 0; border-bottom: 1px solid #1e2235; font-size: .75rem; }
    .bus-row:last-child { border-bottom: none; }
    .bus-badge { padding: 2px 6px; border-radius: 4px; font-size: .68rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .bus-info  { flex: 1; }
    .bus-dir   { font-size: .66rem; color: #4a5568; }
    .bus-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: #3b82f6; } .dot-green { background: #22c55e; }
    .dot-yellow { background: #f59e0b; } .dot-orange { background: #ef4444; } .dot-grey { background: #374151; }
    .bus-away { font-size: .68rem; font-weight: 700; white-space: nowrap; }
    .no-bus   { color: #4a5568; font-size: .75rem; padding: 3px 0; }
    .loading-spin {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid #252d40; border-top-color: #4a90d9; border-radius: 50%;
      animation: spin .7s linear infinite; vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #map { position: relative; z-index: 0; flex: 1; min-height: 0; min-width: 0; }
    #gps-fab {
      position: absolute; right: 12px; bottom: 16px; z-index: 500;
      width: 46px; height: 46px; border-radius: 50%;
      background: #1a3660; border: 2px solid #4a90d9;
      color: #7eb3f7; font-size: 1.1rem;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 2px 10px rgba(0,0,0,.6);
      transition: background .15s;
    }
    #gps-fab:hover { background: #1e3d70; }
    #gps-fab.visible { display: flex; }
    /* ── Panel expand/collapse (mobile only) ── */
    /* Expanded: p-top fills all space, panel-handle stays, map collapses */
    .p-top.panel-full { flex: 1; max-height: unset; }
    #map.panel-full   { flex: 0; height: 0; overflow: hidden; }
    #panel-handle {
      display: none; flex-shrink: 0;
      background: #0d1520; border-top: 2px solid #252d40;
      padding: 6px 16px; cursor: pointer; user-select: none;
      justify-content: space-between; align-items: center;
    }
    #panel-handle.visible { display: flex; }
    .ph-label { font-size: .7rem; font-weight: 700; color: #4a5568; }
    .ph-btn {
      font-size: .72rem; font-weight: 700; color: #7eb3f7;
      background: none; border: 1px solid #252d40; border-radius: 5px;
      padding: 3px 10px; cursor: pointer;
    }
    @media (min-width: 640px) {
      #scr-planner { flex-direction: row; }
      .p-top, .p-top.panel-full {
        width: 300px; flex: none !important;
        max-height: none !important; height: 100%;
        border-bottom: none; border-right: 1px solid #252d40;
      }
      #panel-handle { display: none !important; }
      #map, #map.panel-full {
        flex: 1 !important; height: auto !important;
        max-height: none !important; overflow: hidden !important;
      }
    }
    /* ── Trip detail ── */
    .trip-back { background: none; border: none; color: #7eb3f7; font-size: .8rem; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; }
    .trip-route-hdr { display: flex; align-items: center; gap: 8px; padding: 8px 0 4px; }
    .trip-section { margin-bottom: 14px; }
    .trip-section-title { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: #4a5568; letter-spacing: .05em; border-bottom: 1px solid #252d40; padding-bottom: 4px; margin-bottom: 7px; }
    .journey-step { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; font-size: .8rem; }
    .journey-icon { font-size: .9rem; flex-shrink: 0; width: 20px; }
    .journey-time { font-weight: 700; color: #7eb3f7; min-width: 32px; text-align: right; flex-shrink: 0; font-size: .78rem; }
    .journey-stop-name { font-weight: 700; }
    .journey-stop-id { color: #374151; font-size: .66rem; font-weight: 400; }
    .journey-detail { color: #6b7a99; font-size: .72rem; }
    .journey-connector { padding: 0 0 0 20px; font-size: .72rem; color: #4a5568; }
    .total-box { background: #1a2744; border-radius: 7px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .total-box-label { font-size: .72rem; color: #6b7a99; }
    .total-box-value { font-size: 1.05rem; font-weight: 700; color: #7eb3f7; }
    .live-row { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid #1e2235; font-size: .78rem; }
    .live-row:last-child { border-bottom: none; }
    .live-eta { font-weight: 700; font-size: .78rem; white-space: nowrap; }
    .dep-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .dep-chip { padding: 4px 9px; border-radius: 5px; font-size: .75rem; font-weight: 700; font-variant-numeric: tabular-nums; background: #1e2235; color: #c0d0ea; border: 1px solid #252d40; }
    .dep-chip.next { background: #1a3660; color: #fff; border-color: #4a90d9; box-shadow: 0 0 6px rgba(74,144,217,.3); }
    .tl { position: relative; padding-left: 20px; }
    .tl-line { position: absolute; left: 5px; top: 8px; bottom: 8px; width: 2px; background: #252d40; border-radius: 1px; }
    .tl-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: .77rem; position: relative; }
    .tl-dot { position: absolute; left: -17px; width: 8px; height: 8px; border-radius: 50%; background: #252d40; border: 1px solid #374151; flex-shrink: 0; }
    .tl-dot.board  { background: #2563eb; border-color: #2563eb; width: 12px; height: 12px; left: -19px; }
    .tl-dot.alight { background: #16a34a; border-color: #16a34a; width: 12px; height: 12px; left: -19px; }
    .tl-dot.bus    { background: #ef4444; border-color: #ef4444; width: 10px; height: 10px; left: -18px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
    .tl-name { flex: 1; }
    .tl-id   { color: #374151; font-size: .64rem; }
    .tl-badge { font-size: .64rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
    .tl-badge.board  { background: #1a2744; color: #7eb3f7; }
    .tl-badge.alight { background: #14422a; color: #86efac; }
    .tl-badge.bus    { background: #2d1206; color: #f87171; }

    /* ── Track panel ── */
    .track-back  { background: none; border: none; color: #7eb3f7; font-size: .8rem; cursor: pointer; padding: 0; }
    .track-dirs  { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .track-dir-btn {
      flex: 1; padding: 7px 8px; border: 1.5px solid #252d40; border-radius: 7px;
      background: #141621; color: #6b7a99; font-size: .74rem; font-weight: 700;
      cursor: pointer; text-align: center; transition: all .15s; min-width: 0;
    }
    .track-dir-btn.active { background: #1a2744; color: #a8d4ff; border-color: #4a90d9; }
    .track-bus-list { margin-top: 4px; }
    .track-bus-row  { display: flex; align-items: center; gap: 7px; padding: 6px 0; border-bottom: 1px solid #1e2235; font-size: .78rem; }
    .track-bus-row:last-child { border-bottom: none; }
    .track-refresh  { font-size: .65rem; color: #374151; margin-top: 8px; }
    /* Track button on schedule cards */
    .sched-track-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 9px; border-radius: 5px; border: 1px solid #1a3660;
      background: #0f1d33; color: #7eb3f7; font-size: .68rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .sched-track-btn:hover { background: #1a2f50; border-color: #4a90d9; }
    /* ── Bus notifications ── */
    .notify-btn {
      background: none; border: 1.5px solid #252d40; border-radius: 6px;
      color: #4a5568; font-size: .8rem; padding: 3px 8px; cursor: pointer;
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .notify-btn:hover  { color: #f59e0b; border-color: #f59e0b; }
    .notify-btn.active { color: #f59e0b; border-color: #f59e0b; background: #2d1f05; }
    /* ── Onboarding overlay ── */
    #onboarding {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(8,12,22,.93); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    #onboarding-card {
      background: #1a1d2e; border: 1px solid #252d40; border-radius: 18px;
      padding: 36px 24px 28px; max-width: 320px; width: 100%;
      text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,.9);
    }
    .ob-icon  { font-size: 2.4rem; margin-bottom: 12px; }
    .ob-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────
const CACHE_KEY = 'canakkale_bus_v6';

function isCacheFresh(cached) {
  const d = new Date(cached.fetchedAt);
  const n = new Date();
  return d.getFullYear() === n.getFullYear() &&
         d.getMonth()    === n.getMonth()    &&
         d.getDate()     === n.getDate();
}

// ── Screen switching ──────────────────────────────────────────────────────────
let plannerReady = false;
// Planner is the default screen — init immediately
window.addEventListener('DOMContentLoaded', () => { showOnboarding(); plannerReady = true; initPlanner(); });
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-' + name).classList.add('active');
  document.querySelectorAll('.nb').forEach(b => b.classList.toggle('active', b.dataset.s === name));
  if (name !== 'planner') hidePanelHandle();
  if (name === 'planner') {
    if (!plannerReady) { plannerReady = true; initPlanner(); }
    else if (window._map) setTimeout(() => window._map.invalidateSize(), 50);
    renderBookmarksBar();
  }
}

// ── Schedule helpers ──────────────────────────────────────────────────────────
function todayIsWeekend() { return [0,6].includes(new Date().getDay()); }

function nowStr() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function hasUpcoming(times) {
  if (!times?.length) return false;
  const ns = nowStr();
  return times.some(t => t >= ns) || (new Date().getHours() >= 20 && times.some(t => t < '04:00'));
}

function countUpcoming(times) {
  if (!times?.length) return 0;
  const ns = nowStr(), late = new Date().getHours() >= 20;
  return times.filter(t => t >= ns || (late && t < '04:00')).length;
}

// ── Schedule tab ──────────────────────────────────────────────────────────────
let schedTab = 'wd';
function switchSchedTab(name, btn) {
  schedTab = name;
  document.querySelectorAll('.s-tab-btn').forEach(b => b.classList.remove('active'));
  (btn || document.getElementById('tab' + name.toUpperCase())).classList.add('active');
  document.querySelectorAll('.sched-content').forEach(el => el.classList.remove('visible'));
  document.getElementById('routes-' + name)?.classList.add('visible');
  highlightNextTimes();
}

// ══════════════════════════════════════════════════════════════
// PDF FETCHING & PARSING
// ══════════════════════════════════════════════════════════════

// ── Cache & load ──────────────────────────────────────────────────────────────
let scheduleData    = null;
let kentkartRouteMap = null; // displayRouteCode → {name, routeColor}

async function loadScheduleData(forceRefresh) {
  if (!forceRefresh) {
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (c && isCacheFresh(c)) {
        scheduleData = c;
        if (c.routes?.length) {
          kentkartRouteMap = new Map();
          for (const route of c.routes) {
            const code = route.displayRouteCode.toUpperCase();
            const stripped = code.replace(/^Ç(?=d)/, '');
            kentkartRouteMap.set(code, route);
            if (stripped !== code) kentkartRouteMap.set(stripped, route);
          }
        }
        return;
      }
    } catch {}
  }

  setSchedProgress(10, 'Seferler yükleniyor…');
  const r = await fetch('./data/schedule.json');
  if (!r.ok) throw new Error('schedule.json alınamadı');
  scheduleData = await r.json();
  if (scheduleData.routes?.length) {
    kentkartRouteMap = new Map();
    for (const route of scheduleData.routes) {
      const code     = route.displayRouteCode.toUpperCase();
      const stripped = code.replace(/^Ç(?=d)/, '');
      kentkartRouteMap.set(code, route);
      if (stripped !== code) kentkartRouteMap.set(stripped, route);
    }
  }
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(scheduleData)); } catch {}
  setSchedProgress(100, 'Tamamlandı.');
}

function setSchedProgress(pct, msg, isError) {
  document.getElementById('schedProgressBar').style.width = pct + '%';
  document.getElementById('schedProgressBar').style.background = isError ? '#ef4444' : '';
  const msgEl = document.getElementById('schedMsg');
  msgEl.textContent = msg;
  msgEl.style.color = isError ? '#ef4444' : '';
}

// ── Render schedule ───────────────────────────────────────────────────────────
function renderSchedule() {
  if (!scheduleData) return;
  const age = Math.round((Date.now() - scheduleData.fetchedAt) / 60000);

  document.getElementById('schedLoading').style.display = 'none';
  renderRouteCards(scheduleData.weekday, 'routes-wd', true);
  renderRouteCards(scheduleData.weekend, 'routes-we', false);

  // Auto-select today's tab (user can still switch manually)
  switchSchedTab(todayIsWeekend() ? 'we' : 'wd');
  highlightNextTimes();
}

function renderRouteCards(routeMap, panelId, isToday) {
  const cont = document.getElementById(panelId);
  cont.innerHTML = '';
  const codes = Object.keys(routeMap).sort((a, b) => a.localeCompare(b, 'tr'));
  let shown = 0;

  for (const code of codes) {
    const entry = routeMap[code];
    if (!entry) continue;
    const { name, dir0, dir1 } = entry;

    // When showing today's tab, hide routes with no remaining buses
    const d0 = dir0?.times || [], d1 = dir1?.times || [];
    if (isToday && !hasUpcoming(d0) && !hasUpcoming(d1)) continue;

    const remaining = isToday ? (countUpcoming(d0) + countUpcoming(d1)) : (d0.length + d1.length);

    let body = '';
    // Direction 0
    if (d0.length) {
      const lbl = dir0.label ? esc(dir0.label) + ' →' : 'Gidiş →';
      body += '<div class="dir-section"><div class="dir-lbl">' + lbl + '</div>'
        + '<div class="times-grid">'
        + d0.map(t => '<span class="time-chip" data-time="' + t + '">' + t + '</span>').join('')
        + '</div></div>';
    }
    // Direction 1
    if (d1.length) {
      const lbl = dir1.label ? esc(dir1.label) + ' →' : 'Dönüş →';
      body += '<div class="dir-section"><div class="dir-lbl">' + lbl + '</div>'
        + '<div class="times-grid">'
        + d1.map(t => '<span class="time-chip" data-time="' + t + '">' + t + '</span>').join('')
        + '</div></div>';
    }
    if (!body) continue;

    const metaText = isToday
      ? (remaining > 0 ? remaining + ' sefer kaldı' : 'Sefer kalmadı')
      : (d0.length + d1.length) + ' sefer';

    // Look up kentkart display name and color using the route code prefix
    const pdfCode    = code.split(/\s+/)[0]; // e.g. "Ç1", "Ç11K", "Ç960"
    const ktRoute    = kentkartRouteMap &&
      (kentkartRouteMap.get(pdfCode.toUpperCase()) ||
       kentkartRouteMap.get(pdfCode.replace(/^Ç(?=\d)/, '').toUpperCase()));
    const hexColor   = ktRoute?.routeColor?.replace('#','').padStart(6,'0') || '252d40';
    const textColor  = (() => {
      const r=parseInt(hexColor.slice(0,2),16), g=parseInt(hexColor.slice(2,4),16), b=parseInt(hexColor.slice(4,6),16);
      return (r*299+g*587+b*114)/1000 > 145 ? '#000' : '#fff';
    })();
    const displayCode = ktRoute?.displayRouteCode || pdfCode;
    // Use PDF-parsed name so routes with the same code (e.g. Ç11K KEPEZ vs Ç11K DARDANOS)
    // are always distinguishable; strip the leading route-code token to avoid duplication.
    const pdfDest    = name.replace(/^[A-ZÇŞĞÜÖİ0-9]+\s*/i, '').trim();
    const displayName = esc(pdfDest || name);

    const card = document.createElement('div');
    card.className = 'route-card';
    card.dataset.code = code;
    card.innerHTML =
      '<div class="route-card-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0">' +
          '<span class="sched-badge" style="background:#' + hexColor + ';color:' + textColor + '">' + esc(displayCode) + '</span>' +
          '<span class="rc-name" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + displayName + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:6px">' +
          '<span class="rc-meta">' + metaText + '</span>' +
          '<button class="sched-track-btn" onclick="event.stopPropagation();trackRoute(\''+esc(displayCode)+'\')">' +
            '<span style="font-size:.8rem;line-height:1">🚌</span>Canlı' +
          '</button>' +
          '<span class="rc-chevron">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="route-card-body">' + body + '</div>';
    cont.appendChild(card);
    shown++;
  }

  if (!shown)
    cont.innerHTML = '<p style="color:#4a5568;padding:20px;font-size:.85rem">' +
      (isToday ? 'Bugün için sefer kalmadı.' : 'Bu gün tipi için sefer bulunamadı.') + '</p>';
}

function highlightNextTimes() {
  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
  // Only highlight chips in the currently-visible tab
  const visible = document.querySelector('.sched-content.visible');
  if (!visible) return;
  visible.querySelectorAll('.time-chip').forEach(chip => {
    const [h, m] = chip.dataset.time.split(':').map(Number);
    const mins   = h < 4 ? h * 60 + m + 1440 : h * 60 + m;
    chip.className = 'time-chip' + (mins < nowMins ? ' past' : '');
  });
  // Mark next upcoming chip — prefer today's times (h >= 4) over overnight wrap-around
  visible.querySelectorAll('.dir-section .times-grid').forEach(grid => {
    const upcoming = [...grid.querySelectorAll('.time-chip:not(.past)')];
    const next = upcoming.find(c => parseInt(c.dataset.time) >= 4) || upcoming[0];
    if (next) next.classList.add('next');
  });
}

async function refreshSchedule() {
  document.getElementById('schedLoading').style.display = '';
  document.querySelectorAll('.sched-content').forEach(el => el.classList.remove('visible'));
  try {
    await loadScheduleData(true);
    renderSchedule();
  } catch(e) {
    setSchedProgress(100, 'Hata: ' + e.message, true);
    if (scheduleData) renderSchedule();
  }
}

(async () => {
  try {
    await loadScheduleData(false);
    renderSchedule();
  } catch(e) {
    setSchedProgress(100, 'Yüklenemedi: ' + e.message, true);
  }
})();

setInterval(highlightNextTimes, 60000);

setInterval(() => {
  if (!scheduleData) return;
  const age = Math.round((Date.now() - scheduleData.fetchedAt) / 60000);
}, 60000);

// Auto-refresh at midnight each day
function scheduleMidnightRefresh() {
  const now  = new Date();
  const next = new Date(now);
  next.setHours(24, 0, 10, 0); // 00:00:10 tomorrow (10s past midnight for safety)
  setTimeout(async () => {
    await refreshSchedule();
    scheduleMidnightRefresh(); // set up the next night
  }, next - now);
}
scheduleMidnightRefresh();

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════════════
// PLANNER

const API    = 'https://service.kentkart.com/rl1/';
const REGION = '007';
const QS     = 'region=' + REGION + '&lang=tr&authType=4&resultType=111';

const VAPID_PUBLIC_KEY = 'BHVCtR1I7eXOv825k0yVg3E6y59A0p7wlgO3rUD90sEOXIec97qg4z5ybGlGjcltgQQxytPw6LD9Q202YxZeC7s';
const WORKER_URL       = 'https://bus-notify.17bus-notify.workers.dev'; // e.g. https://bus-notify.yourname.workers.dev

let planOffset = 0; // minutes into the future to plan for

let allStops     = new Map();
let allRoutes    = [];
let pathCache    = [];
let stopToRoutes = new Map();
let mode         = 'origin';
let originStop = null, destStop   = null;
let originClick = null, destClick = null;

let originPin = null, destPin = null;
let busMarkers      = [];

let currentMatches = [];

// ── Bookmarks ─────────────────────────────────────────────────────────────────
let bookmarks = (() => { try { return JSON.parse(localStorage.getItem('bm_locations') || '[]'); } catch { return []; } })();

function saveBookmarks() {
  try { localStorage.setItem('bm_locations', JSON.stringify(bookmarks)); } catch {}
}

function renderBookmarksBar() {
  const list = document.getElementById('bm-list');
  if (!list) return;
  // Update header button label with count
  const lbl = document.getElementById('bm-toggle-label');
  if (lbl) lbl.textContent = bookmarks.length ? 'Yerlerim (' + bookmarks.length + ')' : 'Yerlerim';
  if (!bookmarks.length) {
    list.innerHTML = '<div class="bm-dd-empty">Henüz kayıtlı yer yok.<br>Haritada bir nokta seçip <b style="color:#c0d0ea">+ Ekle</b>\'ye tıklayın.</div>';
    return;

  list.innerHTML = bookmarks.map((bm, i) =>
    '<div class="bm-card" style="margin:2px 8px 2px">' +
      '<span class="bm-icon">⭐</span>' +

      '<div class="bm-actions">' +
        '<button class="bm-btn origin" onclick="useBookmark('+i+',\'origin\')" title="Başlangıç">📍</button>' +
        '<button class="bm-btn dest"   onclick="useBookmark('+i+',\'dest\')"   title="Hedef">🏁</button>' +
        '<button class="bm-btn del"    onclick="deleteBookmark('+i+')"         title="Sil">✕</button>' +
      '</div>' +
    '</div>'
  ).join('');
}

function toggleBmDropdown() {
  const dd  = document.getElementById('bm-dropdown');
  const btn = document.getElementById('bm-toggle-btn');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) renderBookmarksBar();
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  const dd = document.getElementById('bm-dropdown');
  if (!dd?.classList.contains('open')) return;
  if (!dd.contains(e.target) && !document.getElementById('bm-toggle-btn')?.contains(e.target))
    dd.classList.remove('open');
  document.getElementById('bm-toggle-btn')?.classList.remove('open');
});

function saveLocationBookmark(which) {
  // If called from "+ Ekle" (which=null), auto-pick whichever point is set
  if (!which) {
    if (originClick) which = 'origin';
    else if (destClick) which = 'dest';
    else { setHint('Önce haritada bir konum seçin.'); return; }
  }
  let lat, lng, defaultName;
  if (which === 'origin' && originClick) {
    ({ lat, lng } = originClick);
    defaultName = document.getElementById('originName').textContent || 'Konum';
  } else if (which === 'dest' && destClick) {
    ({ lat, lng } = destClick);
    defaultName = document.getElementById('destName').textContent || 'Hedef';
  } else {
    setHint('Önce haritada bir konum seçin.');
    return;
  }
  const name = window.prompt('Konum adı:', defaultName);
  if (!name) return;
  bookmarks.push({ name: name.trim(), lat, lng });
  saveBookmarks();
  renderBookmarksBar();

function haversine(la1,lo1,la2,lo2) {
  const R=6371000,r=Math.PI/180,dL=(la2-la1)*r,dO=(lo2-lo1)*r;
  const a=Math.sin(dL/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function nearestStop(lat,lng){let b=null,bd=Infinity;for(const s of allStops.values()){const d=haversine(lat,lng,s.lat,s.lng);if(d<bd){bd=d;b=s;}}return{stop:b,meters:Math.round(bd)};}
function fmtDist(m){return m<1000?m+'m':(m/1000).toFixed(1)+'km';}
function textOnHex(h){const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return(r*299+g*587+b*114)/1000>145?'#000':'#fff';}
function setHint(msg,warn){const el=document.getElementById('hint');el.textContent=msg;el.className=warn?'warn':'';el.style.display=msg?'':'none';}

function getNextDeparture(code) {
  if (!scheduleData) return undefined;
  const isWE   = [0,6].includes(new Date().getDay());
  const dayData = scheduleData[isWE ? 'weekend' : 'weekday'] || {};
  const entry  = findSchedEntry(dayData, code);
  if (!entry) return null;
  const toM  = t => { const [h, mn] = t.split(':').map(Number); return (h < 4 ? h*60+1440 : h*60) + mn; };
  const all  = [...(entry.dir0?.times || []), ...(entry.dir1?.times || [])].sort((a, b) => toM(a) - toM(b));
  if (!all.length) return null;
  const now  = new Date().getHours() * 60 + new Date().getMinutes();
  const next = all.find(t => toM(t) >= now);
  return next || (all[0] ? all[0] + ' (yarın)' : null);
}

async function initPlanner() {

  });

  // ── Load stops.json (pre-built by GitHub Actions) ────────────────────────────
  try {
    const r = await fetch('./data/stops.json');
    if (!r.ok) throw new Error('stops.json not found');

    allRoutes    = d.routes;

      if (stripped !== code) kentkartRouteMap.set(stripped, route);
    }
    try { localStorage.setItem('kentkart_routes', JSON.stringify([...kentkartRouteMap])); } catch {}
  } catch (e) {
    setHint('Durak verisi yüklenemedi: ' + e.message, true);
    return;
  }

  // ── Add markers and enable UI ────────────────────────────────────────────────
  // Canvas renderer: all stop dots drawn on one <canvas> instead of hundreds of divs
  const _cr = L.canvas({ padding: 0.5 });
  networkStopLayer = L.layerGroup();
  const _stopCircles = [];
  const _stopRadius = z => Math.max(3, z - 10); // grows with zoom: z13=3, z14=4, z16=6...
  for(const s of allStops.values()) {
    const c = L.circleMarker([s.lat,s.lng],{renderer:_cr,radius:_stopRadius(13),color:'#4a7dc0',fillColor:'#4a7dc0',fillOpacity:.8,weight:1})
      .bindTooltip(s.stopName,{direction:'top',offset:[0,-4]})
      .on('click',()=>openStopOnMap(s.stopId));
    c.addTo(networkStopLayer);
    _stopCircles.push(c);
  }
  const _updateStopVis = () => {
    if(!networkStopLayer._active) return;
    const z = window._map.getZoom();
    if(z >= 13) {
      networkStopLayer.addTo(window._map);
      const r = _stopRadius(z);
      _stopCircles.forEach(c => c.setRadius(r));
    } else {
      networkStopLayer.remove();
    }
  };
  networkStopLayer._active = true;
  window._map.on('zoomend', _updateStopVis);

  document.getElementById('loadBar').style.width='100%';
  document.getElementById('loadStatus').textContent = allStops.size+' durak';
  ['btnOrigin','btnDest','btnStops','btnPlanTime'].forEach(id=>document.getElementById(id).disabled=false);
  setMode('origin');
  renderBookmarksBar();

    navigator.geolocation.getCurrentPosition(pos => {
      applyPoint(pos.coords.latitude, pos.coords.longitude, 'origin');
    }, () => {});
  }
}

// Returns estimated minutes to wait for the next bus at the boarding stop,
// Normalise a route code for schedule lookup: strip leading Ç before a digit.
// This makes "Ç960" match the PDF key "960 KEPEZ..." and vice-versa.
function schedCodeNorm(c) { return c.toUpperCase().replace(/^Ç(?=\d)/, ''); }
function findSchedEntry(dayData, routeCode) {
  const norm = schedCodeNorm(routeCode);
  const key  = Object.keys(dayData).find(k => {
    const kn = schedCodeNorm(k.split(' ')[0]);
    return kn === norm;
  });
  return key ? dayData[key] : null;
}

// Pick which PDF direction (dir0/dir1) belongs to the user's kentkart path by
// matching the PDF's KALKIŞ label against the first stops of the kentkart route.
// The mapping is not always dir0=kk0/dir1=kk1 — for many routes it's inverted.
function pickSchedDir(schedEntry, path) {
  if (!schedEntry || !path) return null;
  const normStr = s => (s || '').toUpperCase().replace(/[^A-ZÇĞIİÖŞÜ0-9]/g, '');
  const firstStops = (path.busStopList || []).slice(0, 5).map(s => normStr(s.stopName));
  for (const dir of ['dir0', 'dir1']) {
    const label = normStr(schedEntry[dir]?.label);
    if (label.length < 4) continue;
    for (const stop of firstStops) {
      if (stop.length < 4) continue;
      if (stop.includes(label) || label.includes(stop)) return dir;
      // Share 5+ char substring
      for (let i = 0; i + 5 <= label.length; i++) {
        if (stop.includes(label.slice(i, i + 5))) return dir;
      }
    }
  }
  return null;
}

function schedTimesForPath(schedEntry, path) {
  if (!schedEntry) return [];
  const dir = pickSchedDir(schedEntry, path);
  if (dir) return schedEntry[dir]?.times || [];
  // Fallback: merge both directions if we can't determine the mapping
  return [...(schedEntry.dir0?.times || []), ...(schedEntry.dir1?.times || [])];
}

// accounting for planOffset. Used for ETA-based sorting in findRoutes.
function estimateWaitMins(routeCode, boardSeq, path) {
  const effectiveNow = new Date().getHours() * 60 + new Date().getMinutes() + planOffset;
  const isWE   = [0,6].includes(new Date().getDay());
  const dayData = scheduleData?.[isWE ? 'weekend' : 'weekday'] || {};
  const entry  = findSchedEntry(dayData, routeCode);
  if (!entry) return 999; // no schedule → sort to bottom
  const tm     = t => { const [h, mn] = t.split(':').map(Number); return (h < 4 ? h*60+1440 : h*60) + mn; };
  const times  = schedTimesForPath(entry, path).sort((a, b) => tm(a) - tm(b));
  if (!times.length) return 20;
  const toMins = t => { const [h, mn] = t.split(':').map(Number); return (h < 4 ? h*60+1440 : h*60) + mn; };
  const travel = Math.max(0, boardSeq - 1) * MINS_PER_STOP;
  for (const t of times) {
    const arr = tm(t) + travel;
    if (arr >= effectiveNow) return Math.max(0, Math.round(arr - effectiveNow));
  }
  // All today's buses gone — next-day first bus
  if (times.length) return Math.max(0, Math.round(tm(times[0]) + travel + 1440 - effectiveNow));
  return 999;
}

}

function applyCustomTime() {

  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
  let offset = targetMins - nowMins;
  if (offset < 0) offset += 1440; // next day
  planOffset = offset;
  // Mark Özel button active, deactivate presets
  document.querySelectorAll('.plan-time-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-custom-time').classList.add('active');

  const hint = offset === 0 ? '' : val + ' için planlanıyor.';
  setHint(hint || (originStop && destStop ? 'Rota yenileniyor…' : 'Haritaya tıklayın → başlangıç seçin.'));

function useGPS(){
  if(!navigator.geolocation){alert('Konum desteği yok.');return;}
  setHint('GPS alınıyor…');

    const{latitude:lat,longitude:lng}=pos.coords;
    window._map.setView([lat,lng],16);
    if(mode==='stops')showNearbyStops(lat,lng);
    else{applyPoint(lat,lng,'origin');setMode('dest');}
  },()=>setHint('Konum alınamadı.',true));
}

function applyPoint(lat,lng,which){
  const{stop,meters}=nearestStop(lat,lng);if(!stop)return;
  if(which==='origin'){
    originClick={lat,lng};originStop={...stop,meters};
    if(originMarker)window._map.removeLayer(originMarker);if(originPin)window._map.removeLayer(originPin);
    originMarker=L.marker([lat,lng],{icon:mkPinIcon('#2563eb'),zIndexOffset:1100}).bindTooltip('Konumunuz').addTo(window._map);
    document.getElementById('originName').textContent=stop.stopName;
    document.getElementById('originDist').textContent=fmtDist(meters)+' (en yakın)';
    const rb=document.getElementById('btnReset');rb.disabled=false;rb.style.color='#ef4444';rb.style.borderColor='#7f1d1d';
    setMode('dest');
  }else{
    destClick={lat,lng};destStop={...stop,meters};
    if(destMarker)window._map.removeLayer(destMarker);if(destPin)window._map.removeLayer(destPin);
    destMarker=L.marker([lat,lng],{icon:mkPinIcon('#16a34a'),zIndexOffset:1100}).bindTooltip('Hedefiniz').addTo(window._map);
    document.getElementById('destName').textContent=stop.stopName;
    document.getElementById('destDist').textContent=fmtDist(meters)+' (en yakın)';
  }
  if(originStop&&destStop)findRoutes();
}

function findRoutes(){
  clearDrawn();clearBuses();showNetworkStops();document.getElementById('results').innerHTML='';
  const oLat=originClick.lat,oLng=originClick.lng,dLat=destClick.lat,dLng=destClick.lng;
  let nO=0,nD=0;const bpMap=new Map();
  for(const{path,route}of pathCache){
    const st=path.busStopList||[];if(!st.length)continue;
    const oD=st.map(s=>haversine(oLat,oLng,parseFloat(s.lat),parseFloat(s.lng)));
    const dD=st.map(s=>haversine(dLat,dLng,parseFloat(s.lat),parseFloat(s.lng)));
    if(oD.some(d=>d<=WALK_RADIUS))nO++;if(dD.some(d=>d<=WALK_RADIUS))nD++;
    let best=null;
    for(let oi=0;oi<st.length;oi++){
      if(oD[oi]>WALK_RADIUS)continue;
      let ba=null;
      for(let di=oi+1;di<st.length;di++){if(dD[di]>WALK_RADIUS)continue;if(!ba||dD[di]<ba.d)ba={di,d:dD[di]};}
      if(!ba)continue;
      const sc=ba.di-oi;
      if(!best||oD[oi]<oD[best.oi]||(oD[oi]===oD[best.oi]&&sc<best.sc))
        best={oi,sc,path,route,board:st[oi],alight:st[ba.di],walkB:Math.round(oD[oi]),walkA:Math.round(ba.d),buses:path.busList||[]};
    }
    if(best){const k=path.path_code;if(!bpMap.has(k)||best.walkB<bpMap.get(k).walkB)bpMap.set(k,best);}
  }
  const _isWE   = [0,6].includes(new Date().getDay());
  const _dData  = scheduleData?.[_isWE ? 'weekend' : 'weekday'] || {};
  const matches=[...bpMap.values()].filter(m => {
    if (/^OGR|^ÖĞ/i.test(m.path.displayRouteCode)) return false;
    // Keep if schedule is known in Seferler tab
    if (findSchedEntry(_dData, m.path.displayRouteCode)) return true;
    // Keep if live GPS position available from kentkart
    return (m.buses || []).some(b => b.lat && b.lng);
  }).map(m=>{
    const bSeq = parseInt(m.board.seq) || 0;
    const wait = estimateWaitMins(m.path.displayRouteCode, bSeq, m.path);
    const eta  = Math.round(m.walkB/72) + wait + Math.round(m.sc*MINS_PER_STOP) + Math.round(m.walkA/72);
    return {...m, _wait: wait, _eta: eta};
  }).sort((a,b)=>a._eta-b._eta);
  if(!matches.length){setHint('Doğrudan hat yok. (konuma:'+nO+' hedefe:'+nD+')',true);document.getElementById('results').innerHTML='<p style="color:#4a5568;font-size:.8rem;padding:6px 0">Bağlantı bulunamadı.</p>';hidePanelHandle();return;}
  currentMatches = matches; tripMatch = null;
  hidePlannerGuide();
  setHint(matches.length+' hat bulundu. Detay için bir hatta tıklayın.');
  renderPlannerResults(matches);selectPlannerMatch(matches[0]);
  expandPanel(matches.length);
  if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(refreshBuses,30000);
}

function renderPlannerResults(matches){
  const cont=document.getElementById('results');
  cont.innerHTML='<div class="result-header">Bağlantılı Hatlar</div>';
  for(const m of matches){
    const hex=(m.route.routeColor||'aaaaaa').replace('#','').padStart(6,'0');
    const bh=m.buses.length?m.buses.map(b=>'<span class="bus-chip">🚌 '+(b.plateNumber||'aktif')+'</span>').join(''):'<span class="bus-chip" style="background:#1e2235;color:#4a5568">Aktif araç yok</span>';
    const c=document.createElement('div');c.className='p-route-card';
    c.innerHTML='<div class="p-route-top"><span class="p-route-badge" style="background:#'+hex+';color:'+textOnHex(hex)+'">'+m.path.displayRouteCode+'</span><span class="p-route-name">'+esc(m.route.name||m.path.headSign)+'</span></div>'
      +'<div class="p-route-meta">'+m.sc+' durak arası</div>'
      +'<div style="font-size:.7rem;color:#4a90d9;margin-top:2px">🟦 <b>'+esc(m.board.stopName)+'</b> <span style="color:#4a5568">('+fmtDist(m.walkB)+')</span></div>'
      +'<div style="font-size:.7rem;color:#22c55e">🟩 <b>'+esc(m.alight.stopName)+'</b> <span style="color:#4a5568">('+fmtDist(m.walkA)+')</span></div>'
      +'<div style="margin-top:4px">'+bh+'</div>';
    c.onclick=()=>showTripDetail(m);cont.appendChild(c);
  }
}

function selectPlannerMatch(m, fitMap = true){
  selectedMatch=m;
  document.querySelectorAll('.p-route-card').forEach(c=>c.classList.remove('active'));
  [...document.getElementById('results').querySelectorAll('.p-route-card')]
    .find(c=>c.querySelector('.p-route-badge')?.textContent===m.path.displayRouteCode&&c.innerHTML.includes(m.path.headSign))?.classList.add('active');
  clearDrawn();clearBuses();hideNetworkStops();

  const ROUTE_COLOR = 'f59e0b'; // always yellow
  const pts=(m.path.pointList||[]).map(p=>[parseFloat(p.lat),parseFloat(p.lng)]);
  if(pts.length){const l=L.polyline(pts,{color:'#'+ROUTE_COLOR,weight:5,opacity:.9}).addTo(window._map);drawnLayers.push(l);if(fitMap)window._map.fitBounds(l.getBounds(),{padding:[40,40]});}

  // Walking lines: origin → boarding stop, alight stop → destination
  if (originClick && m.board) {
    drawnLayers.push(L.polyline(
      [[originClick.lat, originClick.lng], [parseFloat(m.board.lat), parseFloat(m.board.lng)]],
      { color: '#2563eb', weight: 4, opacity: .85, dashArray: '6,8' }
    ).addTo(window._map));
  }
  if (destClick && m.alight) {
    drawnLayers.push(L.polyline(
      [[parseFloat(m.alight.lat), parseFloat(m.alight.lng)], [destClick.lat, destClick.lng]],
      { color: '#16a34a', weight: 4, opacity: .85, dashArray: '6,8' }
    ).addTo(window._map));
  }

  // Only show stops between board and alight (inclusive); skip the rest
  const allStopsOnRoute = m.path.busStopList || [];
  const boardIdx  = allStopsOnRoute.findIndex(s => s.stopId === m.board.stopId);
  const alightIdx = allStopsOnRoute.findIndex(s => s.stopId === m.alight.stopId);
  const tripStops = (boardIdx >= 0 && alightIdx >= 0)
    ? allStopsOnRoute.slice(boardIdx, alightIdx + 1)
    : allStopsOnRoute;

  for(const s of tripStops){
    const isB=s.stopId===m.board.stopId, isA=s.stopId===m.alight.stopId;
    drawnLayers.push(L.marker([parseFloat(s.lat),parseFloat(s.lng)],{icon:mkStopIcon(isB?'#2563eb':isA?'#16a34a':'#'+ROUTE_COLOR,isB||isA?14:9),zIndexOffset:isB||isA?500:200})
      .bindTooltip((isB?'🟦 ':isA?'🟩 ':'')+s.stopName,{permanent:isB||isA,direction:'top',offset:[0,isB||isA?-10:-5]}).addTo(window._map));
  }
  drawBuses(m.buses, ROUTE_COLOR);
}

function drawBuses(buses,hex){clearBuses();for(const b of buses){if(!b.lat||!b.lng)continue;busMarkers.push(L.marker([parseFloat(b.lat),parseFloat(b.lng)],{icon:mkBusIcon(hex),zIndexOffset:2000}).bindPopup('<b>'+(b.busLabel||'')+'</b><br>'+(b.plateNumber||'')).addTo(window._map));}}

function clearDrawn(){drawnLayers.forEach(l=>window._map.removeLayer(l));drawnLayers=[];}
function clearBuses(){busMarkers.forEach(l=>window._map.removeLayer(l));busMarkers=[];}
function hideNetworkStops(){if(networkStopLayer){networkStopLayer._active=false;networkStopLayer.remove();}}

// ── Route tracker (launched from Seferler tab) ────────────────────────────────
let trackedPaths   = [];   // all pathCache entries for the tracked route code
let trackedPathIdx = 0;    // which direction is selected
let trackTimer     = null;
let trackLastRefresh = 0;

async function trackRoute(displayRouteCode) {
  showScreen('planner');
  // Wait for planner data (initPlanner is triggered by showScreen)
  if (!pathCache.length) {
    const results = document.getElementById('results');
    results.style.display = '';
    document.getElementById('stopPanel').style.display = 'none';
    results.innerHTML = '<div style="padding:16px 4px;color:#4a5568;font-size:.82rem">Hat verileri yükleniyor…</div>';
    const ok = await new Promise(resolve => {
      const deadline = Date.now() + 60000;
      const iv = setInterval(() => {
        if (pathCache.length) { clearInterval(iv); resolve(true); }
        else if (Date.now() > deadline) { clearInterval(iv); resolve(false); }
      }, 300);
    });
    if (!ok) {
      document.getElementById('results').innerHTML =
        '<div style="padding:16px 4px;color:#ef4444;font-size:.82rem">Hat verileri yüklenemedi.</div>';
      return;
    }
  }

  // Normalise both sides: kentkart stores '11K' while PDF uses 'Ç11K'
  const code = schedCodeNorm(displayRouteCode);
  trackedPaths = pathCache.filter(pe =>
    schedCodeNorm(pe.path.displayRouteCode)  === code ||
    schedCodeNorm(pe.route.displayRouteCode) === code
  );
  if (!trackedPaths.length) {
    document.getElementById('results').innerHTML =
      '<div style="padding:16px 4px;color:#ef4444;font-size:.82rem">' + esc(displayRouteCode) + ' hattı bulunamadı.</div>';
    return;
  }

  trackedPathIdx = 0;
  if (trackTimer) clearInterval(trackTimer);
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  selectedMatch = null; tripMatch = null;

  showTrackPanel();
  if (window._map) window._map.invalidateSize();
  await selectTrackPath(0);
  trackTimer = setInterval(() => selectTrackPath(trackedPathIdx, true), 15000);
}

function showTrackPanel() {
  const pe     = trackedPaths[0];
  const hex    = (pe.route.routeColor || 'aaaaaa').replace('#', '').padStart(6, '0');
  const txt    = textOnHex(hex);
  const code   = pe.path.displayRouteCode;

  const cont = document.getElementById('results');
  cont.style.display = '';
  document.getElementById('stopPanel').style.display = 'none';

  let html = '<div style="padding:10px 2px">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  html += '<button class="track-back" onclick="closeTrackPanel()">← Geri</button>';
  html += '<span class="p-route-badge" style="background:#'+hex+';color:'+txt+'">'+esc(code)+'</span>';
  html += '<span style="font-weight:700;font-size:.88rem;flex:1">'+esc(pe.route.name||pe.path.headSign)+'</span>';
  html += '</div>';

  // Direction buttons
  html += '<div class="track-dirs">';
  trackedPaths.forEach((p, i) => {
    html += '<button class="track-dir-btn'+(i===trackedPathIdx?' active':'')+'" '
          + 'onclick="selectTrackPath('+i+')" id="tdb-'+i+'">'
          + esc(p.path.headSign || ('Yön '+(i+1)))
          + '</button>';
  });
  html += '</div>';

  html += '<div class="track-bus-list" id="track-bus-list"><div style="color:#4a5568;font-size:.75rem;padding:4px 0">Otobüsler yükleniyor…</div></div>';
  html += '<div class="track-refresh" id="track-refresh"></div>';
  html += '</div>';
  cont.innerHTML = html;
}

async function selectTrackPath(idx, refreshOnly = false) {
  trackedPathIdx = idx;

  // Update active button
  trackedPaths.forEach((_, i) => {
    const btn = document.getElementById('tdb-'+i);
    if (btn) btn.classList.toggle('active', i === idx);
  });

  const pe  = trackedPaths[idx];
  const hex = (pe.route.routeColor || '4a7dc0').replace('#', '');

  if (!refreshOnly) {
    clearDrawn(); clearBuses(); hideNetworkStops();
    const pts = (pe.path.pointList || []).map(p => [parseFloat(p.lat), parseFloat(p.lng)]);
    if (pts.length) {
      const l = L.polyline(pts, { color: '#f59e0b', weight: 5, opacity: .9 }).addTo(window._map);
      drawnLayers.push(l);
      window._map.fitBounds(l.getBounds(), { padding: [40, 40] });
    }
    for (const s of (pe.path.busStopList || [])) {
      drawnLayers.push(
        L.marker([parseFloat(s.lat), parseFloat(s.lng)], { icon: mkStopIcon('#'+hex, 9), zIndexOffset: 200 })
          .bindTooltip(s.stopName, { direction: 'top', offset: [0, -5] })
          .addTo(window._map)
      );
    }
  }

  // Fetch fresh bus positions
  try {
    const r = await fetch(API+'web/pathInfo?'+QS
      +'&displayRouteCode='+encodeURIComponent(pe.path.displayRouteCode)
      +'&direction='+pe.path.direction);
    const d = await r.json();
    const fp = d.pathList?.[0];
    if (fp) {
      drawBuses(fp.busList || [], hex);
      renderTrackBuses(fp.busList || [], pe, hex);
    }
  } catch {
    renderTrackBuses(null, pe, hex);
  }

  trackLastRefresh = Date.now();
  const el = document.getElementById('track-refresh');
  if (el) el.textContent = 'Güncellendi: az önce · 15s aralıklarla otomatik';
}

function renderTrackBuses(buses, pe, hex) {
  const list = document.getElementById('track-bus-list');
  if (!list) return;
  if (!buses || !buses.length) {
    list.innerHTML = '<div style="color:#4a5568;font-size:.75rem;padding:4px 0">Aktif otobüs bulunamadı.</div>';
    return;
  }
  const stops = pe.path.busStopList || [];
  const seqOf = {};
  stops.forEach(s => seqOf[s.stopId] = parseInt(s.seq) || 0);
  const seqs    = stops.map(s => parseInt(s.seq) || 0);
  const lastSeq = seqs.length ? Math.max(...seqs) : 0;

  let html = '';
  for (const b of buses) {
    if (!b.lat && !b.lng) continue;
    const seq  = seqOf[b.stopId] ?? -1;
    const rem  = seq >= 0 ? lastSeq - seq : null;
    const col  = rem === null ? '#f59e0b' : rem <= 3 ? '#ef4444' : rem <= 8 ? '#22c55e' : '#7eb3f7';
    const remTxt = rem !== null ? rem + ' durak kaldı' : 'Konum bilinmiyor';
    html += '<div class="track-bus-row">'
          + '<div class="bus-dot" style="background:#'+hex+';width:10px;height:10px;border-radius:50%;flex-shrink:0"></div>'
          + '<div style="flex:1"><b>' + esc(b.plateNumber || b.busLabel || 'Otobüs') + '</b>'
          + '<div style="font-size:.68rem;color:#4a5568">' + esc(b.stopName || stops.find(s=>s.stopId===b.stopId)?.stopName || '') + '</div></div>'
          + '<span style="font-size:.72rem;font-weight:700;color:'+col+'">' + remTxt + '</span>'
          + '</div>';
  }
  list.innerHTML = html || '<div style="color:#4a5568;font-size:.75rem;padding:4px 0">Aktif otobüs bulunamadı.</div>';
}

function closeTrackPanel() {
  if (trackTimer) { clearInterval(trackTimer); trackTimer = null; }
  trackedPaths = [];
  clearDrawn(); clearBuses(); showNetworkStops();
  document.getElementById('results').innerHTML = '';
  setHint('Haritaya tıklayın → başlangıç seçin.');
}

// ── Bus arrival notifications (Cloudflare Worker + Web Push) ─────────────────
let notifyMatch  = null;
let notifySubId  = null; // subscription ID returned by the Worker

async function toggleBusNotify() {
  // Cancel if already watching this trip
  if (notifyMatch && tripMatch && notifyMatch.path.path_code === tripMatch.path.path_code) {
    await stopBusNotify();
    const btn = document.getElementById('notify-btn');
    if (btn) { btn.textContent = '🔕 Bildir'; btn.classList.remove('active'); }
    return;
  }

  if (WORKER_URL === 'REPLACE_WITH_YOUR_WORKER_URL') {
    alert('Worker URL ayarlanmamış. Kurulum talimatlarını takip edin.');
    return;
  }
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('Bu tarayıcı Web Push desteklemiyor.');
    return;
  }

  // Permission
  const perm = Notification.permission === 'granted'
    ? 'granted' : await Notification.requestPermission();
  if (perm !== 'granted') {
    alert('Bildirim izni reddedildi. Tarayıcı ayarlarından izin verin.');
    return;
  }

  // Get or create push subscription
  let reg;
  try { reg = await navigator.serviceWorker.ready; } catch {
    alert('Servis çalışanı hazır değil.'); return;
  }

  // Always unsubscribe first — stale subscriptions from previous VAPID keys
  // cause "push service error" from FCM. Fresh subscribe is more reliable.
  try {
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
  } catch {}

  let pushSub;
  try {
    pushSub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  } catch (e) {
    const isBrave = (navigator.brave && await navigator.brave.isBrave().catch(()=>false)) || false;
    const reason  = isBrave
      ? 'Brave tarayıcısında masaüstünde Google push servisi varsayılan olarak devre dışıdır.'
      : 'Tarayıcınız push bildirimlerine izin vermiyor.';
    alert('Bildirim aboneliği oluşturulamadı.\n\n' + reason);
    return;
  }

  // Register with Worker
  const m = tripMatch;
  const stops  = m.path.busStopList || [];
  const seqOf  = {};
  stops.forEach(s => { seqOf[s.stopId] = parseInt(s.seq) || 0; });

  // Compute next scheduled departure timestamp (epoch ms) for time-based alert
  const isWE_     = [0,6].includes(new Date().getDay());
  const dayData_  = scheduleData?.[isWE_ ? 'weekend' : 'weekday'] || {};
  const schedE_   = findSchedEntry(dayData_, m.path.displayRouteCode);
  const schedT_   = schedTimesForPath(schedE_, m.path);
  let nextDepTs   = null;
  if (schedT_.length) {
    const nowMs = Date.now();
    const curH  = new Date().getHours();
    for (const t of schedT_) {
      const [h, mn] = t.split(':').map(Number);
      const d = new Date();
      // Times like "00:30" appearing late in the sorted list mean tomorrow morning
      if (h < 4 && curH >= 4) d.setDate(d.getDate() + 1);
      d.setHours(h, mn, 0, 0);
      if (d.getTime() > nowMs) { nextDepTs = d.getTime(); break; }
    }
    if (!nextDepTs) {
      const [h, mn] = schedT_[0].split(':').map(Number);
      const d = new Date(); d.setDate(d.getDate() + 1); d.setHours(h, mn, 0, 0);
      nextDepTs = d.getTime();
    }
  }

  try {
    const res = await fetch(WORKER_URL + '/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subscription: pushSub.toJSON(),
        trip: {
          routeCode:     m.path.displayRouteCode,
          direction:     m.path.direction,
          boardStopId:   m.board.stopId,
          boardSeq:      seqOf[m.board.stopId] ?? 0,
          boardStopName: m.board.stopName,
          headSign:      m.path.headSign,
          pathCode:      m.path.path_code,
          nextDepTs,
        },
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { id } = await res.json();
    notifySubId  = id;
    notifyMatch  = m;
    const btn = document.getElementById('notify-btn');
    if (btn) { btn.textContent = '🔔 Açık'; btn.classList.add('active'); }
  } catch (e) {
    alert('Worker\'a bağlanılamadı: ' + e.message);
  }
}

async function stopBusNotify() {
  if (notifySubId) {
    fetch(WORKER_URL + '/subscribe', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: notifySubId }),
    }).catch(() => {});
    notifySubId = null;
  }
  notifyMatch = null;
}

function urlB64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// ── Trip detail ───────────────────────────────────────────────────────────────
const MINS_PER_STOP = 1.5;

function showTripDetail(m, fitMap = true) {
  tripMatch = m;
  selectPlannerMatch(m, fitMap); // draw route on map

  const stops   = m.path.busStopList || [];
  const seqOf   = {};
  stops.forEach(s => seqOf[s.stopId] = parseInt(s.seq) || 0);
  const boardSeq  = seqOf[m.board.stopId]  ?? 0;
  const alightSeq = seqOf[m.alight.stopId] ?? 0;
  const boardIdx  = stops.findIndex(s => s.stopId === m.board.stopId);
  const alightIdx = stops.findIndex(s => s.stopId === m.alight.stopId);
  const tripStops = (boardIdx >= 0 && alightIdx >= 0) ? stops.slice(boardIdx, alightIdx + 1) : [];

  // Time estimates
  const walkToMins   = Math.max(1, Math.round(m.walkB / 72));
  const walkFromMins = Math.max(1, Math.round(m.walkA / 72));
  const rideMins     = Math.round(m.sc * MINS_PER_STOP);

  // Which buses are approaching the board stop (seq < boardSeq)
  const approaching = (m.buses || [])
    .filter(b => { const s = seqOf[b.stopId] ?? -1; return s >= 0 && s < boardSeq; })
    .map(b    => ({ ...b, stopsAway: boardSeq - seqOf[b.stopId], minsAway: Math.round((boardSeq - seqOf[b.stopId]) * MINS_PER_STOP) }))
    .sort((a, b) => a.stopsAway - b.stopsAway);
  const atStop  = (m.buses || []).filter(b => b.stopId === m.board.stopId);
  const onBoard = (m.buses || []).filter(b => { const s = seqOf[b.stopId] ?? -1; return s >= boardSeq && s < alightSeq; });

  // ── Schedule lookup ──────────────────────────────────────────────────────────
  // Schedule is keyed by full route name (e.g. "Ç11K KEPEZ ESENLER"), not by code.
  const isWE    = [0,6].includes(new Date().getDay());
  const dayData = scheduleData?.[isWE ? 'weekend' : 'weekday'] || {};
  const schedEntry = findSchedEntry(dayData, m.path.displayRouteCode);
  const realNow    = new Date().getHours() * 60 + new Date().getMinutes();
  const nowMins    = realNow + planOffset;
  const curStr     = new Date().getHours().toString().padStart(2,'0') + ':' + new Date().getMinutes().toString().padStart(2,'0');
  // toMins maps early-morning times (h<4) to next-day to keep sort order sane
  const toMins     = t => { const [h, mn] = t.split(':').map(Number); return (h < 4 ? h*60+1440 : h*60) + mn; };
  // Sort by actual chronological minute value — NOT alphabetically.
  // Alphabetical puts "00:10" before "07:40", making it look like the next bus
  // is 741 minutes away instead of finding the real next same-day departure.
  const allSchedTimes = schedTimesForPath(schedEntry, m.path).sort((a, b) => toMins(a) - toMins(b));

  // For each terminal departure, calculate when the bus reaches the boarding stop.
  const stopsFromTerminal = Math.max(0, boardSeq - 1);
  const travelToBoard     = stopsFromTerminal * MINS_PER_STOP;

  let nextDep = null; // { time: "HH:MM", boardMins: number, tomorrow?: true }
  for (const t of allSchedTimes) {
    const boardMins = toMins(t) + travelToBoard;
    if (boardMins >= nowMins) { nextDep = { time: t, boardMins }; break; }
  }
  // All of today's buses already departed — wrap to first bus tomorrow
  if (!nextDep && allSchedTimes.length) {
    const t = allSchedTimes[0];
    nextDep = { time: t, boardMins: toMins(t) + travelToBoard + 1440, tomorrow: true };
  }

  // ── Wait time ────────────────────────────────────────────────────────────────
  // Live data is only relevant when planning for now; skip it when planOffset > 0
  let waitMins = 0, waitLabel = '', waitDetail = '';
  if (!planOffset && atStop.length) {
    waitMins   = 0;
    waitLabel  = 'Otobüs durağa geldi';
    waitDetail = atStop[0].plateNumber || '';
  } else if (!planOffset && approaching.length) {
    waitMins   = approaching[0].minsAway;
    waitLabel  = 'Canlı konum';
    waitDetail = (approaching[0].plateNumber || 'Otobüs') + ' · ' + approaching[0].stopsAway + ' durak uzakta';
  } else if (nextDep) {
    waitMins   = Math.max(0, Math.round(nextDep.boardMins - nowMins));
    waitLabel  = (nextDep.tomorrow ? 'Yarın ' : '') + nextDep.time + ' kalkışı';
    const arrRaw = nextDep.boardMins % 1440;
    const arrH = Math.floor(arrRaw / 60).toString().padStart(2,'0');
    const arrM = Math.floor(arrRaw % 60).toString().padStart(2,'0');
    waitDetail = 'Durağa ~' + arrH + ':' + arrM + '\'de gelir' + (nextDep.tomorrow ? ' (yarın)' : '');
  } else {
    waitMins   = 999;
    waitLabel  = 'Program bilinmiyor';
    waitDetail = 'Canlı konum yok';
  }

  const totalMins = walkToMins + waitMins + rideMins + walkFromMins;

  // ── Scheduled departure chips (next 5 terminal departures) ──────────────────
  const nextTimes = allSchedTimes.filter(t => t >= curStr).slice(0, 5);
  if (!nextTimes.length && new Date().getHours() >= 20)
    nextTimes.push(...allSchedTimes.filter(t => t < '04:00').slice(0, 2));

  // Badge
  const hex = (m.route.routeColor || 'aaaaaa').replace('#','').padStart(6,'0');
  const txt = textOnHex(hex);

  // Build set of stopIds that have a live bus (for timeline markers)
  const busAtStop = new Set((m.buses || []).map(b => b.stopId));

  // ── Render ────────────────────────────────────────────────────────────────
  let html = '';

  // Back button + route header
  const isNotifying = notifyMatch && notifyMatch.path.path_code === m.path.path_code;
  html += '<div style="display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid #252d40;margin-bottom:10px">'
        +   '<button class="trip-back" onclick="closeTripDetail()">← Hatlar</button>'
        +   '<span class="p-route-badge" style="background:#'+hex+';color:'+txt+'">'+m.path.displayRouteCode+'</span>'
        +   '<span style="font-size:.78rem;font-weight:600;flex:1">'+esc(m.path.headSign)+'</span>'
        +   '<button class="notify-btn'+(isNotifying?' active':'')+'" id="notify-btn" '
        +     'onclick="toggleBusNotify()">'
        +     (isNotifying ? '🔔 Açık' : '🔕 Bildir')
        +   '</button>'
        + '</div>';

  // ── Journey summary ──────────────────────────────────────────────────────
  html += '<div class="trip-section">';
  html += '<div class="trip-section-title">Yolculuk Özeti</div>';

  // Walk to board
  html += '<div class="journey-step">'
        +   '<span class="journey-icon">🚶</span>'
        +   '<span class="journey-time">~'+walkToMins+' dk</span>'
        +   '<div><span class="journey-stop-name">'+esc(m.board.stopName)+'</span> <span class="journey-stop-id">#'+m.board.stopId+'</span>'
        +   '<div class="journey-detail">'+fmtDist(m.walkB)+' yürüyüş · Biniş noktası</div>'
        +   '</div>'
        + '</div>';

  // Wait
  const waitCol = atStop.length ? '#3b82f6' : approaching.length ? '#22c55e' : '#f59e0b';
  html += '<div class="journey-step">'
        +   '<span class="journey-icon">⏱</span>'
        +   '<span class="journey-time" style="color:'+waitCol+'">'+(waitMins === 0 ? 'Şimdi' : '~'+waitMins+' dk')+'</span>'
        +   '<div><span style="color:#c0d0ea;font-weight:600">'+esc(waitLabel)+'</span>'
        +   '<div class="journey-detail">'+esc(waitDetail)+'</div>'
        +   '</div>'
        + '</div>';

  // Ride
  html += '<div class="journey-step">'
        +   '<span class="journey-icon">🚌</span>'
        +   '<span class="journey-time">~'+rideMins+' dk</span>'
        +   '<div><span style="color:#c0d0ea;font-weight:600">'+m.sc+' durak</span>'
        +   '<div class="journey-detail">'+esc(m.path.headSign)+'</div>'
        +   '</div>'
        + '</div>';

  // Alight + walk to dest
  html += '<div class="journey-step">'
        +   '<span class="journey-icon">🏁</span>'
        +   '<span class="journey-time">~'+walkFromMins+' dk</span>'
        +   '<div><span class="journey-stop-name">'+esc(m.alight.stopName)+'</span> <span class="journey-stop-id">#'+m.alight.stopId+'</span>'
        +   '<div class="journey-detail">'+fmtDist(m.walkA)+' yürüyüş · İniş noktası</div>'
        +   '</div>'
        + '</div>';

  html += '<div class="total-box">'
        +   '<span class="total-box-label">Toplam tahmini süre</span>'
        +   '<span class="total-box-value">~'+totalMins+' dk</span>'
        + '</div>';
  html += '</div>';

  // ── Incoming buses ───────────────────────────────────────────────────────
  html += '<div class="trip-section">';
  html += '<div class="trip-section-title">Biniş Noktasına Gelen Otobüsler</div>';

  if (atStop.length) {
    html += '<div class="live-row"><div class="bus-dot dot-blue" style="width:10px;height:10px"></div>'
          + '<div style="flex:1"><b>'+esc(atStop[0].plateNumber||'Otobüs')+'</b></div>'
          + '<span class="live-eta" style="color:#3b82f6">Durağa geldi!</span></div>';
  }
  if (approaching.length) {
    approaching.forEach(b => {
      const dot = b.stopsAway <= 2 ? 'dot-blue' : b.stopsAway <= 5 ? 'dot-green' : 'dot-yellow';
      const col = b.stopsAway <= 2 ? '#3b82f6' : b.stopsAway <= 5 ? '#22c55e' : '#f59e0b';
      html += '<div class="live-row"><div class="bus-dot '+dot+'" style="width:10px;height:10px"></div>'
            + '<div style="flex:1"><b>'+esc(b.plateNumber||'Otobüs')+'</b><div style="font-size:.68rem;color:#4a5568">'+b.stopsAway+' durak uzakta</div></div>'
            + '<span class="live-eta" style="color:'+col+'">~'+b.minsAway+' dk</span></div>';
    });
  }
  if (!atStop.length && !approaching.length) {
    const eta = nextTimes[0] ? 'Sıradaki sefer: '+nextTimes[0] : 'Aktif araç yok';
    html += '<div style="color:#4a5568;font-size:.78rem;padding:3px 0">'+eta+'</div>';
  }
  html += '</div>';

  // ── Scheduled times ──────────────────────────────────────────────────────
  if (nextTimes.length) {
    html += '<div class="trip-section">';
    html += '<div class="trip-section-title">Programlı Seferler <span style="font-weight:400;opacity:.6">(yaklaşık)</span></div>';
    html += '<div class="dep-chips">';
    nextTimes.forEach((t, i) => { html += '<span class="dep-chip'+(i===0?' next':'')+'">'+t+'</span>'; });
    html += '</div></div>';
  }

  // ── Buses riding the route (between board and alight) ────────────────────
  if (onBoard.length) {
    html += '<div class="trip-section">';
    html += '<div class="trip-section-title">Güzergahta Aktif Otobüsler</div>';
    onBoard.forEach(b => {
      const rem = alightSeq - (seqOf[b.stopId] ?? alightSeq);
      html += '<div class="live-row"><div class="bus-dot dot-orange" style="width:10px;height:10px"></div>'
            + '<div style="flex:1"><b>'+esc(b.plateNumber||'Otobüs')+'</b>'
            + '<div style="font-size:.68rem;color:#4a5568">'+rem+' durak kaldı</div></div>'
            + '<span class="live-eta" style="color:#ef4444">~'+Math.round(rem*MINS_PER_STOP)+' dk</span></div>';
    });
    html += '</div>';
  }

  // ── Stop timeline ────────────────────────────────────────────────────────────
  if (tripStops.length > 1) {
    html += '<div class="trip-section">';
    html += '<div class="trip-section-title">Güzergah Durakları</div>';
    html += '<div class="tl"><div class="tl-line"></div>';
    tripStops.forEach(s => {
      const isBoard  = s.stopId === m.board.stopId;
      const isAlight = s.stopId === m.alight.stopId;
      const hasBus   = busAtStop.has(s.stopId);
      const dotCls   = isBoard ? 'board' : isAlight ? 'alight' : hasBus ? 'bus' : '';
      html += '<div class="tl-item">'
            +   '<div class="tl-dot '+dotCls+'"></div>'
            +   '<span class="tl-name">'+esc(s.stopName)+'</span>'
            +   '<span class="tl-id">#'+s.stopId+'</span>';
      if (isBoard)  html += ' <span class="tl-badge board">Biniş</span>';
      if (isAlight) html += ' <span class="tl-badge alight">İniş</span>';
      if (hasBus && !isBoard && !isAlight) html += ' <span class="tl-badge bus">🚌</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // ── Show in results panel ────────────────────────────────────────────────────
  const cont = document.getElementById('results');
  cont.innerHTML = '<div style="padding:12px 2px;overflow-y:auto;height:100%">' + html + '</div>';
  document.getElementById('stopPanel').style.display = 'none';
  cont.style.display = '';
}

function closeTripDetail() {
  stopBusNotify();
  tripMatch = null;
  renderPlannerResults(currentMatches);
  if (selectedMatch) {
    // Re-highlight active card
    [...document.getElementById('results').querySelectorAll('.p-route-card')]
      .find(c => c.querySelector('.p-route-badge')?.textContent === selectedMatch.path.displayRouteCode)
      ?.classList.add('active');
  }
}

// ── Stops feature ─────────────────────────────────────────────────────────────
function openStopOnMap(stopId){const s=allStops.get(stopId);if(!s)return;setMode('stops');window._map.setView([s.lat,s.lng],Math.max(window._map.getZoom(),16));showNearbyStops(s.lat,s.lng);}
function showNearbyStops(lat,lng){
  if(stopRefreshTimer)clearInterval(stopRefreshTimer);openStopId=null;
  const nearby=[...allStops.values()].map(s=>({...s,meters:Math.round(haversine(lat,lng,s.lat,s.lng))})).sort((a,b)=>a.meters-b.meters).slice(0,5);
  setHint((nearby[0]?.stopName||'?')+' yakınında '+nearby.length+' durak.');
  renderNearbyList(nearby);if(nearby[0])openStop(nearby[0].stopId);
  stopRefreshTimer=setInterval(()=>{if(openStopId)openStop(openStopId,true);},30000);
}
function renderNearbyList(stops){
  const panel=document.getElementById('stopPanel');panel.innerHTML='<div class="result-header">Yakındaki Duraklar</div>';
  for(const s of stops){
    const routes=stopToRoutes.get(s.stopId)||[];
    const rn=[...new Set(routes.map(r=>r.routeCode))].join(', ')||'—';
    const div=document.createElement('div');div.className='nearby-stop';div.dataset.stopId=s.stopId;
    div.innerHTML='<div class="ns-header"><span class="ns-dist">'+s.meters+'m</span><div><div class="ns-name">'+esc(s.stopName)+' <span style="color:#374151;font-size:.62rem">#'+s.stopId+'</span></div><div class="ns-tags">'+rn+'</div></div></div>'
      +'<div class="ns-body" id="sb-'+s.stopId+'"><span class="loading-spin"></span>Yükleniyor…</div>';
    div.onclick=()=>openStop(s.stopId);panel.appendChild(div);
  }
}
function openStop(stopId,silent){
  document.querySelectorAll('.nearby-stop').forEach(el=>el.classList.toggle('open',el.dataset.stopId===stopId));
  openStopId=stopId;
  if(!silent){const b=document.getElementById('sb-'+stopId);if(b)b.innerHTML='<span class="loading-spin"></span>Yükleniyor…';}
  fetchStopBuses(stopId);
}
async function fetchStopBuses(stopId){
  const entries=stopToRoutes.get(stopId)||[];const seen=new Set();
  const toFetch=entries.filter(e=>{const k=e.routeCode+':'+e.direction;if(seen.has(k))return false;seen.add(k);return true;});
  const responses=await Promise.all(toFetch.map(e=>fetch(API+'web/pathInfo?'+QS+'&displayRouteCode='+encodeURIComponent(e.routeCode)+'&direction='+e.direction).then(r=>r.json()).catch(()=>null)));
  const rows=[];
  for(let i=0;i<toFetch.length;i++){
    const e=toFetch[i],fp=responses[i]?.pathList?.[0];
    const seqOf={};for(const s of(fp?.busStopList||[]))seqOf[s.stopId]=parseInt(s.seq)||0;
    const tSeq=seqOf[stopId]??e.seq,busList=fp?.busList||[];
    const approaching=busList.filter(b=>(seqOf[b.stopId]??-1)>=0&&seqOf[b.stopId]<tSeq).map(b=>({...b,stopsAway:tSeq-seqOf[b.stopId]})).sort((a,b)=>a.stopsAway-b.stopsAway);
    const atStop=busList.filter(b=>b.stopId===stopId);
    rows.push({entry:e,approaching,atStop});
  }
  rows.sort((a,b)=>{const ap=a.atStop.length?0:a.approaching.length?a.approaching[0].stopsAway:999;const bp=b.atStop.length?0:b.approaching.length?b.approaching[0].stopsAway:999;return ap-bp;});
  renderStopBuses(stopId,rows);
}
function renderStopBuses(stopId,rows){
  const body=document.getElementById('sb-'+stopId);if(!body)return;
  if(!rows.length){body.innerHTML='<div class="no-bus">Hat bulunamadı.</div>';return;}
  body.innerHTML=rows.map(({entry:e,approaching,atStop})=>{
    const hex=e.routeColor.replace('#','').padStart(6,'0');
    const badge='<span class="bus-badge" style="background:#'+hex+';color:'+textOnHex(hex)+'">'+e.routeCode+'</span>';
    let dot,away;
    if(atStop.length){dot='dot-blue';away='Durağa geldi';}
    else if(approaching.length){const n=approaching[0].stopsAway;dot=n<=2?'dot-blue':n<=5?'dot-green':n<=10?'dot-yellow':'dot-orange';away=n+' durak önde';}
    else{dot='dot-grey';const nx=getNextDeparture(e.routeCode);away=nx===undefined?'Aktif araç yok':nx===null?'Bugün sefer kalmadı':'Sıradaki: '+nx;}
    const plate=atStop[0]?.plateNumber||approaching[0]?.plateNumber||'';
    return '<div class="bus-row">'+badge+'<div class="bus-info"><div>'+esc(e.headSign)+'</div><div class="bus-dir">'+plate+'</div></div><div class="bus-dot '+dot+'"></div><span class="bus-away">'+away+'</span></div>';
  }).join('');
}
</script>
